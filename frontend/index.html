<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TTB Label Check</title>
    <link rel="stylesheet" href="/static/styles.css?v=batch-single-1" />
  </head>
  <body>
    <main class="page-shell">
      <header class="page-header">
        <p class="eyebrow">TTB Label Verification</p>
        <h1>TTB Label Check</h1>
      </header>

      <div class="mode-switch" role="tablist" aria-label="Verification mode">
        <button id="single-mode-button" class="mode-button mode-button--active" type="button" role="tab" aria-selected="true" aria-controls="single-panel">
          Single Label
        </button>
        <button id="batch-mode-button" class="mode-button" type="button" role="tab" aria-selected="false" aria-controls="batch-panel">
          Batch Labels
        </button>
      </div>

      <form id="verify-form" class="verify-form" novalidate>
        <div id="single-panel">
        <section class="form-section" aria-labelledby="image-title">
          <h2 id="image-title">Label Image</h2>
          <label class="file-picker" for="image-input">
            <span class="file-picker__title">Choose label image</span>
            <span id="file-name" class="file-picker__meta">Choose an image</span>
          </label>
          <input id="image-input" name="image" type="file" accept="image/*" />
          <img id="image-preview" class="image-preview" alt="Selected label preview" hidden />
        </section>

        <section class="form-section" aria-labelledby="fields-title">
          <h2 id="fields-title">Application Information</h2>

          <div class="field-grid">
            <label class="field-label" for="brand-name">Brand Name</label>
            <input id="brand-name" name="brand_name" type="text" autocomplete="off" required />

            <label class="field-label" for="product-class">Product Type</label>
            <input id="product-class" name="class_type" type="text" autocomplete="off" required />

            <label class="field-label" for="producer-name">Producer Name</label>
            <input id="producer-name" name="producer" type="text" autocomplete="off" required />

            <label class="field-label" for="country-origin">Country of Origin</label>
            <input id="country-origin" name="country_of_origin" type="text" autocomplete="off" required />

            <label class="field-label" for="abv">Alcohol Content, like 45%</label>
            <input id="abv" name="abv" type="text" inputmode="decimal" pattern="[0-9]+([.][0-9]+)?([ ]?%|[ ]?(proof|Proof|PROOF))?" autocomplete="off" required />

            <label class="field-label" for="net-contents">Net Contents, like 750 mL</label>
            <input id="net-contents" name="net_contents" type="text" inputmode="decimal" pattern="[0-9]+([.][0-9]+)?[ ]?(mL|ml|ML|L|l|cL|cl|CL|fl oz|FL OZ|oz|OZ)" autocomplete="off" required />

            <label class="field-label" for="government-warning">Government Warning</label>
            <textarea id="government-warning" name="government_warning" rows="5" required></textarea>
          </div>
        </section>

        <div id="form-message" class="form-message" role="status" aria-live="polite">
          Choose an image and fill in all fields to check the label.
        </div>

        <button id="submit-button" class="primary-button" type="submit" disabled>Check Label</button>
        </div>
      </form>

      <form id="batch-form" class="verify-form" novalidate hidden>
        <div id="batch-panel">
          <section class="form-section" aria-labelledby="batch-image-title">
            <h2 id="batch-image-title">Label Images</h2>
            <label class="file-picker" for="batch-image-input">
              <span class="file-picker__title">Add label images</span>
              <span id="batch-file-name" class="file-picker__meta">Choose up to <span id="batch-limit">...</span> images</span>
            </label>
            <input id="batch-image-input" name="images" type="file" accept="image/*" multiple />
          </section>

          <section id="batch-rows-section" class="form-section" aria-labelledby="batch-fields-title" hidden>
            <div class="section-heading">
              <h2 id="batch-fields-title">Application Information</h2>
            </div>
            <div id="batch-rows" class="batch-rows"></div>
          </section>

          <div id="batch-form-message" class="form-message" role="status" aria-live="polite">
            Choose label images to check together.
          </div>

          <button id="batch-submit-button" class="primary-button" type="submit" disabled>Check All Labels</button>
        </div>
      </form>

      <section id="result-panel" class="result-panel" tabindex="-1" hidden aria-live="polite"></section>
    </main>

    <script type="module" src="/static/app.js?v=quality-4"></script>
  </body>
</html>
